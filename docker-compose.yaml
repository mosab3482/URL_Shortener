services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/urlShortener
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis
    restart: on-failure

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    # ports:
    #   - "27017:27017"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  mongo_data:
  redis_data:
